# Node health configuration for TE33A diesel locomotive (GE Evolution ES44ACi)
#
# Based on operational limits from docs/analys.md.
#
# Per-component damage_rate (health points lost per second at risk=1.0):
#   🔴 критичный      → 0.08  (задир вкладышей — ресурс минуты при P < 2 бар)
#   🔴 очень быстрый  → 0.05
#   🔴 быстрый        → 0.03–0.04
#   🟡 умеренный      → 0.015
#
# weight: contribution to the overall weighted health_index.
# aggregation: how multiple sensor risks are combined for one component.

damage_rate: 0.02

norms:
  fuel_nominal_lh: 300    # Номинальный расход топлива при штатной нагрузке (Л/ч)

components:

  # ── Дизельный двигатель (GEVO-12) ────────────────────────────────────────
  # Цепь 3: T охл.↑ → вязкость масла↓ → давление масла↓ → задир вкладышей
  # oil_pressure: КРИТИЧНЫЙ — при P < 2 бар ресурс вкладышей измеряется минутами
  engine:
    label: "Дизельный двигатель"
    weight: 2.0
    damage_rate: 0.08   # 🔴 критичный (Аррениус + граничная смазка)
    aggregation: max
    sensors:
      - key: oil_temp
        risk_type: linear_hi
        warn: 90          # °C — по analys.md (ранее 80, скорректировано)
        crit: 105         # °C — масляная плёнка разрывается
        exponent: 2.5
      - key: oil_pressure
        risk_type: linear_lo
        warn: 3.5         # бар — нижний порог гидродинамического клина
        crit: 2.0         # бар — risk=1.0; ниже — мгновенный задир
        exponent: 3.0     # резкое нарастание риска вблизи критической точки

  # ── Система охлаждения ───────────────────────────────────────────────────
  # Особенно критично при внешней T > 40°C (Казахстан)
  cooling_system:
    label: "Система охлаждения"
    weight: 1.3
    damage_rate: 0.04   # 🔴 быстрый — кавитация гильз, прогар прокладки ГБЦ
    aggregation: max
    sensors:
      - key: coolant_temp
        risk_type: linear_hi
        warn: 88          # °C — по analys.md (ранее 80, скорректировано)
        crit: 100         # °C — risk=1.0
        exponent: 2.0

  # ── Турбонагнетатель (ТКР) ──────────────────────────────────────────────
  # Цепь 4: засорение фильтра → давление наддува↓ → неполное сгорание → T выхлопа↑
  turbocharger:
    label: "Турбонагнетатель"
    weight: 1.2
    damage_rate: 0.04   # 🔴 быстрый — помпаж, нагар лопаток, дисбаланс
    aggregation: max
    sensors:
      - key: boost_pressure
        risk_type: band_outside
        ok_lo: 1.8        # бар — нижняя граница нормального наддува
        ok_hi: 2.8        # бар — верхняя граница нормального наддува
        crit_lo: 1.2      # бар — провал → детонация
        crit_hi: 3.4      # бар — перенаддув → задир поршней
        exponent: 2.0

  # ── Обороты дизеля ──────────────────────────────────────────────────────
  # Разнос при отказе регулятора; износ кулачков при пиках оборотов
  engine_rpm:
    label: "Обороты дизеля"
    weight: 0.8
    damage_rate: 0.015  # 🟡 умеренный
    aggregation: max
    sensors:
      - key: engine_rpm
        risk_type: band_outside
        ok_lo: 450        # об/мин — холостой ход
        ok_hi: 1050       # об/мин — максимальные рабочие обороты
        crit_lo: 400      # об/мин — нестабильная работа
        crit_hi: 1100     # об/мин — опасная зона разноса
        exponent: 2.0

  # ── Топливная система ────────────────────────────────────────────────────
  # Уровень топлива + аномальный расход (ранний признак износа форсунок)
  fuel_system:
    label: "Топливная система"
    weight: 0.7
    damage_rate: 0.01
    aggregation: max
    sensors:
      - key: fuel
        risk_type: linear_lo
        warn: 4000        # Л — запас сокращается
        crit: 300         # Л — аварийный резерв
        exponent: 1.0     # линейное истощение
      - key: fuel_consumption
        risk_type: ratio_hi
        norm_key: fuel_nominal_lh
        warn_pct: 150     # % от 300 Л/ч = 450 Л/ч — по analys.md
        crit_pct: 173     # % от 300 Л/ч = 520 Л/ч — критично
        exponent: 1.0

  # ── Главный генератор ────────────────────────────────────────────────────
  main_generator:
    label: "Главный генератор"
    weight: 0.8
    damage_rate: 0.015  # 🟡 умеренный
    aggregation: max
    sensors:
      - key: main_gen_v
        risk_type: band_outside
        ok_lo: 480        # В — нижняя граница нормы
        ok_hi: 580        # В — верхняя граница нормы
        crit_lo: 380      # В — перегрузка выпрямительных диодов
        crit_hi: 680      # В — перенапряжение выпрямителя
        exponent: 2.0

  # ── Тормозная система (давление магистрали) ──────────────────────────────
  brake_system:
    label: "Тормозная система"
    weight: 0.8
    damage_rate: 0.015  # 🟡 умеренный
    aggregation: max
    sensors:
      - key: brake
        risk_type: band_outside
        ok_lo: 4.5        # атм
        ok_hi: 5.8        # атм
        crit_lo: 3.5      # атм — скольжение → прокат бандажа
        crit_hi: 6.5      # атм — перегрев колодок
        exponent: 2.0

  # ── Компрессор (температура + режим заполнения) ──────────────────────────
  compressor:
    label: "Компрессор"
    weight: 0.7
    damage_rate: 0.015  # 🟡 умеренный
    aggregation: max
    sensors:
      - key: compressor_temp
        risk_type: linear_hi
        warn: 60          # °C
        crit: 85          # °C — по analys.md
        exponent: 2.5
      - key: brake_fill_rate
        risk_type: linear_hi
        warn: 0.08        # атм/с
        crit: 0.25        # атм/с
        exponent: 3.0
