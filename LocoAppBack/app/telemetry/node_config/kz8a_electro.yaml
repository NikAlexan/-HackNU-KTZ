# Node health configuration for KZ8A electric locomotive (Alstom Prima T8)
#
# Based on operational limits from docs/analys.md.
#
# Per-component damage_rate (health points lost per second at risk=1.0):
#   🔴 очень быстрый  → 0.05  (full degradation in ~33 min at max risk)
#   🔴 быстрый        → 0.03  (~55 min)
#   🟡 умеренный      → 0.015 (~111 min)
#   🟢 медленный      → 0.005 (~330 min)
#
# weight: contribution of this component to the overall health_index.
# aggregation: how multiple sensor risks are combined for one component.
#   max      — component risk = worst individual sensor (default, safe choice)
#   mean     — arithmetic mean
#   weighted — per-sensor weight field

# Global fallback damage_rate (used if component does not specify its own)
damage_rate: 0.02

norms:
  power_nominal_kw: 8800   # Rated traction power of the KZ8A model (kW)

components:

  # ── Тяговый трансформатор ────────────────────────────────────────────────
  # Цепь 1: U↓ → I↑ → T↑ → деградация изоляции (правило Монтзингера: -50% ресурса на +10°C)
  transformer:
    label: "Трансформатор"
    weight: 1.5
    damage_rate: 0.05   # 🔴 очень быстрый
    aggregation: max
    sensors:
      - key: transformer_temp
        risk_type: linear_hi
        warn: 85          # °C — начало деградации изоляции класса H/F
        crit: 95          # °C — risk=1.0
        exponent: 2.5     # медленный рост вблизи 85°C, резкий после ~90°C
      - key: pantograph_current
        risk_type: linear_hi
        warn: 750         # А — по analys.md: 750–850 А = предупреждение
        crit: 900         # А — > 900 А = критично
        exponent: 2.0

  # ── Тяговые электродвигатели (8 осей) ───────────────────────────────────
  traction_drives:
    label: "Тяговые электродвигатели"
    weight: 1.2
    damage_rate: 0.03   # 🔴 быстрый — нагрев обмоток, IGBT-стресс
    aggregation: max
    sensors:
      - key: td_currents_max
        risk_type: linear_hi
        warn: 500         # А — по analys.md (ранее 550, скорректировано)
        crit: 600         # А — risk=1.0
        exponent: 3.0     # только перегрузка даёт реальный износ

  # ── Контактная сеть ──────────────────────────────────────────────────────
  # Нормальный диапазон KZ8A: 22–27 кВ. Риск при выходе за пределы.
  catenary_system:
    label: "Контактная сеть"
    weight: 1.0
    damage_rate: 0.03
    aggregation: max
    sensors:
      - key: catenary_v
        risk_type: band_outside
        ok_lo: 21.0       # кВ — нижняя граница нормы (analys.md warn < 21 кВ)
        ok_hi: 27.5       # кВ — верхняя граница нормы
        crit_lo: 19.0     # кВ — crit < 19 кВ
        crit_hi: 29.0     # кВ — crit > 29 кВ
        exponent: 2.0

  # ── Пантограф (контактные вставки) ──────────────────────────────────────
  # Дуговая эрозия вставок при токе > 700 А
  pantograph:
    label: "Пантограф"
    weight: 1.0
    damage_rate: 0.03   # 🔴 быстрый
    aggregation: max
    sensors:
      - key: pantograph_current
        risk_type: linear_hi
        warn: 700         # А — умеренная нагрузка
        crit: 850         # А — интенсивная дуговая эрозия
        exponent: 2.0

  # ── Коэффициент мощности / EMI-фильтры ──────────────────────────────────
  power_factor:
    label: "Коэффициент мощности"
    weight: 0.8
    damage_rate: 0.015  # 🟡 умеренный
    aggregation: max
    sensors:
      - key: power_factor
        risk_type: linear_lo
        warn: 0.85        # — риск начинается при снижении cos φ < 0.85
        crit: 0.75        # — risk=1.0
        exponent: 2.0

  # ── Силовая электроника (IGBT, DC-звено) ────────────────────────────────
  power_electronics:
    label: "Силовая электроника"
    weight: 1.0
    damage_rate: 0.02
    aggregation: max
    sensors:
      - key: power_kw
        risk_type: ratio_hi
        norm_key: power_nominal_kw
        warn_pct: 100     # % от номинала 8800 кВт — риск при работе на пределе
        crit_pct: 115     # % — перегрузка IGBT-модулей
        exponent: 2.0

  # ── Тормозная система (давление магистрали) ──────────────────────────────
  brake_system:
    label: "Тормозная система"
    weight: 0.8
    damage_rate: 0.015  # 🟡 умеренный
    aggregation: max
    sensors:
      - key: brake
        risk_type: band_outside
        ok_lo: 4.5        # атм — нижняя граница нормы
        ok_hi: 5.8        # атм — верхняя граница нормы
        crit_lo: 3.5      # атм — недодавление → скольжение → прокат бандажа
        crit_hi: 6.5      # атм — перегрев колодок
        exponent: 2.0

  # ── Компрессор (температура + режим заполнения) ──────────────────────────
  compressor:
    label: "Компрессор"
    weight: 0.7
    damage_rate: 0.015  # 🟡 умеренный
    aggregation: max
    sensors:
      - key: compressor_temp
        risk_type: linear_hi
        warn: 60          # °C — начало теплового стресса
        crit: 85          # °C — по analys.md (ранее 100, скорректировано)
        exponent: 2.5
      - key: brake_fill_rate
        risk_type: linear_hi
        warn: 0.08        # атм/с — нормальный максимум при заполнении
        crit: 0.25        # атм/с — гонка компрессора
        exponent: 3.0
