services:
  mqtt:
    image: emqx/emqx:5.8
    container_name: loco_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "18083:18083"
    environment:
      EMQX_NODE_NAME: emqx@localhost
    networks:
      - default
      - loco_shared

  db:
    image: postgres:16-alpine
    container_name: dashboard_back_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: loco_dashboard
      POSTGRES_USER: dash_user
      POSTGRES_PASSWORD: dash_pass
    ports:
      - "5433:5432"
    volumes:
      - dashboard_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dash_user -d loco_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: dashboard_back_api
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: postgresql+asyncpg://dash_user:dash_pass@db:5432/loco_dashboard
      API_KEY: super-secret-key-change-me
      JWT_SECRET: change-me-in-production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      MQTT_URL: mqtt://loco_mqtt:1883
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    networks:
      - default
      - loco_shared

networks:
  loco_shared:
    name: loco_shared

volumes:
  dashboard_postgres_data:
